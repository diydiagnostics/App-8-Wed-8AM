<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMP Color Diagnostic App</title>
 
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 20px;
            padding: 20px;
        }
 
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
 
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }
 
        input[type="file"] {
            padding: 10px;
            margin: 10px 0;
            cursor: pointer;
        }
 
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
 
        button:hover {
            background-color: #45a049;
        }
 
        #preview {
            margin-top: 20px;
            max-width: 400px;
            border: 2px solid #ccc;
            border-radius: 5px;
            display: none;
        }
 
        #result {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            min-height: 40px;
        }
 
        .debug-info {
            margin-top: 20px;
            padding: 10px;
            background-color: #e8f4f8;
            border-radius: 5px;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
 
<body>
 
    <h1>LAMP Color Diagnostic App</h1>
    <p>Upload an image of your LAMP test to determine if it is POSITIVE (yellow) or NEGATIVE (pink).</p>
 
    <input type="file" id="imageInput" accept="image/*">
    <br>
    <button onclick="analyzeImage()">Analyze Image</button>
 
    <br>
    <img id="preview" alt="Image Preview">
 
    <div id="result"></div>
    <div class="debug-info" id="debugInfo"></div>
 
    <script>
 
        const imageInput = document.getElementById("imageInput");
        const preview = document.getElementById("preview");
        const resultDiv = document.getElementById("result");
        const debugInfo = document.getElementById("debugInfo");
 
        let uploadedImage = null;
 
        // Event listener for image upload
        imageInput.addEventListener("change", function(event) {
            const file = event.target.files[0];
 
            if (file) {
                const reader = new FileReader();
 
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = "block";
 
                    uploadedImage = new Image();
                    uploadedImage.src = e.target.result;
                };
 
                reader.readAsDataURL(file);
            }
        });
 
        // Convert RGB to HSV
        // Returns { h: 0-360, s: 0-1, v: 0-1 }
        function rgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const d = max - min;
 
            let h = 0;
            const s = max === 0 ? 0 : d / max;
            const v = max;
 
            if (d !== 0) {
                if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
                else if (max === g) h = ((b - r) / d + 2) / 6;
                else h = ((r - g) / d + 4) / 6;
            }
 
            return { h: h * 360, s: s, v: v };
        }
 
        // Main analysis function
        function analyzeImage() {
            if (!uploadedImage) {
                alert("Please upload an image first!");
                return;
            }
 
            if (!uploadedImage.complete) {
                uploadedImage.onload = function() {
                    performAnalysis();
                };
            } else {
                performAnalysis();
            }
        }
 
        function performAnalysis() {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
 
            canvas.width = uploadedImage.width;
            canvas.height = uploadedImage.height;
 
            ctx.drawImage(uploadedImage, 0, 0);
 
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
 
            let totalR = 0;
            let totalG = 0;
            let totalB = 0;
            let yellowCount = 0;
            let pinkCount = 0;
 
            const pixelCount = data.length / 4;
 
            // Loop through all pixels
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
 
                totalR += r;
                totalG += g;
                totalB += b;
 
                // Convert pixel to HSV and vote on color
                const hsv = rgbToHsv(r, g, b);
 
                // Only count pixels that are sufficiently saturated and bright
                // (ignore near-white, near-black, and near-gray pixels)
                if (hsv.s > 0.15 && hsv.v > 0.2) {
                    // Yellow hue range: ~30 to 90 degrees
                    if (hsv.h >= 30 && hsv.h <= 90) {
                        yellowCount++;
                    }
                    // Pink/magenta hue range: ~300 to 360 and 0 to 30 degrees
                    if (hsv.h >= 300 || hsv.h <= 30) {
                        pinkCount++;
                    }
                }
            }
 
            const avgR = Math.round(totalR / pixelCount);
            const avgG = Math.round(totalG / pixelCount);
            const avgB = Math.round(totalB / pixelCount);
 
            const avgHsv = rgbToHsv(avgR, avgG, avgB);
            const h = avgHsv.h;
            const s = avgHsv.s;
 
            console.log("Average RGB:", avgR, avgG, avgB);
            console.log("Average HSV:", Math.round(h), "deg,", (s * 100).toFixed(0), "% sat");
            console.log("Yellow pixels:", yellowCount, "| Pink pixels:", pinkCount);
 
            debugInfo.innerText = `Debug Info — Avg RGB: R=${avgR}, G=${avgG}, B=${avgB} | Avg hue: ${Math.round(h)}° sat: ${(s * 100).toFixed(0)}% | Yellow pixels: ${yellowCount} | Pink pixels: ${pinkCount}`;
 
            // Color classification using hue and pixel voting
            const isYellowHue = h >= 30 && h <= 90 && s > 0.15;
            const isPinkHue = (h >= 300 || h <= 30) && s > 0.10;
            const yellowDominant = yellowCount > pinkCount * 1.5;
            const pinkDominant = pinkCount > yellowCount * 1.5;
 
            let resultText = "";
 
            if ((isYellowHue || yellowDominant) && !isPinkHue) {
                resultText = "🟡 POSITIVE: Sample appears YELLOW (amplification detected)";
            } else if ((isPinkHue || pinkDominant) && !isYellowHue) {
                resultText = "🔴 NEGATIVE: Sample appears PINK (no amplification)";
            } else if (yellowCount > pinkCount) {
                resultText = "🟡 LIKELY POSITIVE: Color suggests yellow, but result is ambiguous — please retest to confirm";
            } else if (pinkCount > yellowCount) {
                resultText = "🔴 LIKELY NEGATIVE: Color suggests pink, but result is ambiguous — please retest to confirm";
            } else {
                resultText = "⚠️ UNCERTAIN: Color is ambiguous, please retest";
            }
 
            resultDiv.innerText = resultText;
        }
 
    </script>
 
</body>
</html>
